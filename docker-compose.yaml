



version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: hromadianyn_user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hromadianyn_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hromadianyn_user:postgres@db:5432/hromadianyn_db
    depends_on:
      db:
        condition: service_healthy


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5500:80"
    depends_on:
      - backend

volumes:
  postgres_data:
